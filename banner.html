<head>
    <style>
        /* Keyframe animations must stay in a style block as they cannot be written inline */
        @keyframes scale-up4 {
            20% {
                background-color: #ffffff;
                transform: scaleY(1.5);
            }
            40% {
                transform: scaleY(1);
            }
        }
        .cssbuttons-io {
            position: relative;
            font-family: inherit;
            font-weight: 500;
            font-size: 18px;
            letter-spacing: 0.05em;
            border-radius: 0.8em;
            cursor: pointer;
            border: none;
            background: linear-gradient(to right, #8e2de2, #ffff00);
            color: ghostwhite;
            overflow: hidden;
        }

        .cssbuttons-io svg {
        width: 1.2em;
        height: 1.2em;
        margin-right: 0.5em;
        }

        .cssbuttons-io span {
        position: relative;
        z-index: 10;
        transition: color 0.4s;
        display: inline-flex;
        align-items: center;
        padding: 0.8em 1.2em 0.8em 1.05em;
        }

        .cssbuttons-io::before,
        .cssbuttons-io::after {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        }

        .cssbuttons-io::before {
        content: "";
        background: #000;
        width: 120%;
        left: -10%;
        transform: skew(30deg);
        transition: transform 0.4s cubic-bezier(0.3, 1, 0.8, 1);
        }

        .cssbuttons-io:hover::before {
        transform: translate3d(100%, 0, 0);
        }

        .cssbuttons-io:active {
        transform: scale(0.95);
        }
        .icon-btn-container {
        position: relative;
        display: flex;
        gap: 10px;
        }

        .icon-btn {
        font-size: 2.4rem;
        text-align: center;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        color: #ffffff;
        border: 5px solid #fff;
        transition: all 0.3s ease;
        cursor: pointer;
        outline: none;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 5px 0 rgba(0, 0, 0, 0.2);
        }

        .icon-btn:active {
        transform: scale(0.95);
        box-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
        }

        .icon-btn-red {
        background-color: #f73a45;
        box-shadow: 0px 0px 5px #f73a45;
        }

        .icon-btn-green {
        background-color: #3eac21;
        box-shadow: 0px 0px 5px #3eac21;
        }

        .icon-btn-green svg,
        .icon-btn-red svg {
        width: 35px;
        height: 35px;
        }

    </style>
</head>
