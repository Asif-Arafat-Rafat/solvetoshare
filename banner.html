<head>
    <style>
        /* Keyframe animations must stay in a style block as they cannot be written inline */
        @keyframes scale-up4 {
            20% {
                background-color: #ffffff;
                transform: scaleY(1.5);
            }
            40% {
                transform: scaleY(1);
            }
        }
    </style>
</head>

<div id="extension_banner" style="
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 800px;
    height: 50px;
    color: #ffffff;
    background-color: rgba(26, 26, 26, 0.95);
    border: 1px solid rgba(44, 187, 93, 0.4);
    border-radius: 25px;
    padding: 0 24px;
    box-sizing: border-box;
    z-index: 2147483647;
    box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
">
    <div class="loader" style="display: flex; align-items: center; margin-right: 16px;">
        <span class="bar" style="
            display: inline-block;
            width: 3px;
            height: 20px;
            background-color: rgba(255, 255, 255, .5);
            border-radius: 10px;
            animation: scale-up4 1s linear infinite;
        "></span>
        
        <span class="bar" style="
            display: inline-block;
            width: 3px;
            height: 15px;
            margin: 0 5px;
            background-color: rgba(255, 255, 255, .5);
            border-radius: 10px;
            animation: scale-up4 1s linear infinite;
            animation-delay: .25s;
        "></span>
        
        <span class="bar" style="
            display: inline-block;
            width: 3px;
            height: 10px;
            background-color: rgba(255, 255, 255, .5);
            border-radius: 10px;
            animation: scale-up4 1s linear infinite;
            animation-delay: .5s;
        "></span>
    </div>

    <h3 style="
        margin: 0; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        font-size: 14px; 
        font-weight: 600;
        letter-spacing: 0.3px;
    ">
        Evaluating your Code......
    </h3>
</div>
