<head>
    <style>
        /* Keyframe animations must stay in a style block as they cannot be written inline */
        @keyframes scale-up4 {
            20% {
                background-color: #ffffff;
                transform: scaleY(1.5);
            }
            40% {
                transform: scaleY(1);
            }
        }

        /* Standardized Button Reset */
        .banner-btn {
            padding: 6px 14px;
            margin: 0;
            border: none;
            background: none;
            cursor: pointer;
            --primary-color: #ffffff;
            --hovered-color: #4ade80; /* Elegant green accent */
            position: relative;
            display: flex;
            font-weight: 600;
            font-size: 14px;
            gap: 0.5rem;
            align-items: center;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.08);
            transition: background-color 0.2s, transform 0.2s;
        }

        .banner-btn:hover {
            background-color: rgba(74, 222, 128, 0.15);
            transform: translateY(-1px);
        }

        .banner-btn p {
            margin: 0;
            position: relative;
            font-size: 13px;
            color: var(--primary-color);
            transition: color 0.2s;
        }

        .banner-btn:hover p {
            color: var(--hovered-color);
        }

        .banner-btn svg {
            color: var(--primary-color);
            transition: transform 0.2s, color 0.2s;
            width: 14px;
            height: 14px;
        }

        .banner-btn:hover svg {
            transform: translateX(3px);
            color: var(--hovered-color);
        }

        /* Specific styles for Not Interested button */
        #notInterestedBtn {
            --hovered-color: #f87171; /* Soft red */
        }
        #notInterestedBtn:hover {
            background-color: rgba(248, 113, 113, 0.15);
        }

        /* Full Screen Modal Overlay */
        #response_banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(15, 15, 15, 0.96);
            border-left: 3px solid #2cbd5d;
            display: none; /* Controlled dynamically via flex/none */
            align-items: center;
            justify-content: center;
            z-index: 2147483646; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #f3f4f6;
            backdrop-filter: blur(12px);
        }

        /* Modal Container */
        .response-modal-card {
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            background: #1e1e1e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .response-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #252526;
        }

        .response-modal-header h2 {
            margin: 0;
            font-size: 18px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .response-modal-body {
            padding: 24px;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Scrollbar Styling */
        .response-modal-body::-webkit-scrollbar {
            width: 8px;
        }
        .response-modal-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .response-modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 10px 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .strength-card {
            background: rgba(74, 222, 128, 0.05);
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .improvement-card {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .card-header-badge {
            font-weight: 700;
            font-size: 14px;
            margin: 0 0 6px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-strength { color: #4ade80; }
        .badge-improvement { color: #f87171; }

        .card-detail {
            margin: 0;
            font-size: 13px;
            color: #9ca3af;
            line-height: 1.5;
        }

        .code-snippet {
            font-family: 'Courier New', Courier, monospace;
            background: #121212;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 8px 0;
            font-size: 12px;
            color: #f3f4f6;
            overflow-x: auto;
            border-left: 3px solid #ef4444;
        }

        .suggestion-box {
            font-size: 12.5px;
            color: #38bdf8;
            margin-top: 6px;
            font-style: italic;
        }

        .raw-text-fallback {
            white-space: pre-wrap;
            font-family: monospace;
            background: #121212;
            padding: 16px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
        }

        .close-modal-btn {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: #9ca3af;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .close-modal-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }
    </style>
</head>

<!-- MODAL POPUP FOR DETAILED RESULTS -->
<div id="response_banner">
    <div class="response-modal-card">
        <div class="response-modal-header">
            <h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                AI Evaluation Result
            </h2>
            <button class="close-modal-btn" id="closeModalBtn">Dismiss</button>
        </div>
        <div class="response-modal-body" id="evaluationResult">
            <!-- Rendered content will dynamically mount here -->
        </div>
    </div>
</div>

<!-- BOTTOM BAR FLOATING NOTIFIER -->
<div id="extension_banner" style="
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 800px;
    height: 54px;
    color: #ffffff;
    background-color: rgba(26, 26, 26, 0.95);
    border: 1px solid rgba(44, 187, 93, 0.4);
    border-radius: 27px;
    padding: 0 24px;
    box-sizing: border-box;
    z-index: 2147483647;
    box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
">
    <!-- EVALUATING LOADING BANNER -->
    <div id="preResponse" style="display: flex; align-items: center;">
        <div class="loader" style="display: flex; align-items: center; margin-right: 16px;">
            <span class="bar" style="
                display: inline-block;
                width: 3px;
                height: 20px;
                background-color: rgba(255, 255, 255, .5);
                border-radius: 10px;
                animation: scale-up4 1s linear infinite;
            "></span>
        
            <span class="bar" style="
                display: inline-block;
                width: 3px;
                height: 15px;
                margin: 0 5px;
                background-color: rgba(255, 255, 255, .5);
                border-radius: 10px;
                animation: scale-up4 1s linear infinite;
                animation-delay: .25s;
            "></span>
        
            <span class="bar" style="
                display: inline-block;
                width: 3px;
                height: 10px;
                background-color: rgba(255, 255, 255, .5);
                border-radius: 10px;
                animation: scale-up4 1s linear infinite;
                animation-delay: .5s;
            "></span>
        </div>
        <h3 id="loadingText" style="
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
        ">
            Evaluating your Code......
        </h3>
    </div>

    <!-- POST EVALUATED ACTIONS -->
    <div id="postResponse" style="
        display: none;
        align-items: center;
        gap: 16px;
    ">
        <span id="completionStatusText" style="
            font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
        ">
            Evaluation Complete!
        </span>

        <button id="seeEvaluationBtn" class="banner-btn">
            <p data-text="See_Evaluation">See Evaluation</p>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
            </svg>
        </button>

        <button id="notInterestedBtn" class="banner-btn">
            <p data-text="Not_Interested!">Close</p>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
</div>
