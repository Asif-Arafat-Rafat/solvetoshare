<head>
    <style>
        /* Keyframe animations must stay in a style block as they cannot be written inline */
        @keyframes scale-up4 {
            20% {
                background-color: #ffffff;
                transform: scaleY(1.5);
            }
            40% {
                transform: scaleY(1);
            }
        }
/* From Uiverse.io by satyamchaudharydev */ 
        button {
            padding: 0;
            margin: 0;
            border: none;
            background: none;
            cursor: pointer;
        }

        button {
            --primary-color: #111;
            --hovered-color: #c84747;
            position: relative;
            display: flex;
            font-weight: 600;
            font-size: 20px;
            gap: 0.5rem;
            align-items: center;
        }

        button p {
            margin: 0;
            position: relative;
            font-size: 20px;
            color: var(--primary-color);
        }

        button::after {
            position: absolute;
            content: "";
            width: 0;
            left: 0;
            bottom: -7px;
            background: var(--hovered-color);
            height: 2px;
            transition: 0.3s ease-out;
        }

        button p::before {
            position: absolute;
            /*   box-sizing: border-box; */
            content: attr(data-text);
            width: 0%;
            inset: 0;
            color: var(--hovered-color);
            overflow: hidden;
            transition: 0.3s ease-out;
        }

        button:hover::after {
            width: 100%;
        }

        button:hover p::before {
            width: 100%;
        }

        button:hover svg {
            transform: translateX(4px);
            color: var(--hovered-color);
        }

        button svg {
            color: var(--primary-color);
            transition: 0.2s;
            position: relative;
            width: 15px;
            transition-delay: 0.2s;
        }
        #Response_banner{
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            width: auto;
            height: auto;
            background-color: rgba(26, 26, 26, 0.95);
            border: 1px solid rgba(44, 187, 93, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2147483646; /* Just below the extension banner */
        }
    </style>
</head>
<div id="Response_banner">

</div>
<div id="extension_banner" style="
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 800px;
    height: 50px;
    color: #ffffff;
    background-color: rgba(26, 26, 26, 0.95);
    border: 1px solid rgba(44, 187, 93, 0.4);
    border-radius: 25px;
    padding: 0 24px;
    box-sizing: border-box;
    z-index: 2147483647;
    box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
">
    <div id="preResponse" style="display: flex; align-items: center;">
        <div class="loader" style="display: flex; align-items: center; margin-right: 16px;">
            <span class="bar" style="
                display: inline-block;
                width: 3px;
                height: 20px;
                background-color: rgba(255, 255, 255, .5);
                border-radius: 10px;
                animation: scale-up4 1s linear infinite;
            "></span>
        
            <span class="bar" style="
                display: inline-block;
                width: 3px;
                height: 15px;
                margin: 0 5px;
                background-color: rgba(255, 255, 255, .5);
                border-radius: 10px;
                animation: scale-up4 1s linear infinite;
                animation-delay: .25s;
            "></span>
        
            <span class="bar" style="
                display: inline-block;
                width: 3px;
                height: 10px;
                background-color: rgba(255, 255, 255, .5);
                border-radius: 10px;
                animation: scale-up4 1s linear infinite;
                animation-delay: .5s;
            "></span>
        </div>
        <h3 style="
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
        ">
            Evaluating your Code......
        </h3>
    </div>
<div id="postResponse" style="
    display:none;
    align-items:center;
    gap:12px;
">
    <span style="
        font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
        font-size:14px;
        font-weight:600;
        letter-spacing:0.3px;
    ">
        Evaluation Complete!
    </span>

<button id="seeEvaluationBtn">

    <path

</button>

      stroke-linecap="round"

</button>
</div>
