<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolveToShare</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <main class="popup-shell">
        <header class="popup-header">
            <div class="logo-container">
                <img src="logo.png" alt="SolveToShare Logo" class="logo-img">
                <div class="brand-text">
                    <span class="brand-solve">SOLVE</span><span class="brand-share">ToShare</span>
                </div>
            </div>
            <p class="popup-tagline">AI-Powered Portfolio Engine</p>
        </header>

        <hr class="divider">

        <section class="config-section">
            <div class="form-group">
                <label for="modelSelect">AI Engine Model</label>
                <select id="modelSelect" class="form-control">
                    <option value="gpt-4o">GPT-4o (Recommended)</option>
                    <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                    <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                    <option value="llama-3">Llama 3 (Local/Ollama)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="apiKeyInput">API Key</label>
                <div class="input-wrapper">
                    <input type="password" id="apiKeyInput" class="form-control" placeholder="sk-••••••••••••••••">
                    <button type="button" id="toggleKeyBtn" class="icon-btn" title="Toggle Visibility">👁️</button>
                </div>
            </div>
        </section>

        <footer class="popup-footer">
            <div class="status-container">
                <span class="status-indicator connected"></span>
                <p id="statusText" class="popup-copy">Ready on LeetCode / Codeforces</p>
            </div>
            <button id="actionButton" type="button" class="btn-primary">Check Status</button>
        </footer>
    </main>

    <script src="popup.js"></script>
</body>
</html>
